services:
  - type: web
    name: cham-cong-khuon-mat
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/ping
    envVars:
      - key: MODEL_NAME
        value: buffalo_s
      - key: DATA_DIR
        value: /tmp/data
      - key: PYTHONUNBUFFERED
        value: "1"

# Blueprint Render (FREE) — https://render.com
# Lưu ý: gói free KHÔNG có ổ cứng lưu lâu dài — redeploy có thể mất dữ liệu đăng ký.

services:
  - type: web
    name: cham-cong-khuon-mat
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/ping
    envVars:
      - key: MODEL_NAME
        value: buffalo_s
      - key: DATA_DIR
        value: /tmp/data
      - key: PYTHONUNBUFFERED
        value: "1"

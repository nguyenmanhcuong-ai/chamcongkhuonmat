<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <title>Đăng ký nhân viên</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tablet.css" />
</head>
<body class="app-shell page-register">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Đăng ký nhân viên</h1>
      </div>
    </div>
    <div class="header-meta">
      <div class="clock clock-header" aria-live="polite">
        <div class="clock-time" id="clockTime">--:--:--</div>
        <div class="clock-date" id="clockDate">--</div>
      </div>
      <nav class="app-nav" aria-label="Menu">
        <a href="index.html">Chấm công</a>
        <a href="register.html" class="active">Đăng ký</a>
        <a href="setup.html" class="nav-settings" title="IP server">⚙</a>
      </nav>
    </div>
  </header>

  <main class="app-main app-main-landscape register-main">
    <section class="panel camera-panel register-camera">
      <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay" aria-hidden="true"></canvas>
        <div class="face-scan-ring" aria-hidden="true"></div>
        <span class="camera-label">Căn mặt trong khung</span>
      </div>
      <canvas id="captureCanvas" class="hidden" aria-hidden="true"></canvas>
    </section>

    <section class="panel register-form-panel">
      <div class="panel-body">
        <div class="form-grid form-grid-landscape">
          <div class="form-group">
            <label for="employeeId">Mã NV</label>
            <input id="employeeId" type="text" placeholder="NV001" autocomplete="off" />
          </div>
          <div class="form-group">
            <label for="employeeName">Họ tên</label>
            <input id="employeeName" type="text" placeholder="Nguyễn Văn A" autocomplete="name" />
          </div>
        </div>

        <div class="sample-progress">
          <div class="sample-progress-label">
            <span>Ảnh mẫu</span>
            <span id="sampleLabel">0 / 7</span>
          </div>
          <div class="sample-bar">
            <div id="sampleBarFill" class="sample-bar-fill"></div>
          </div>
          <div id="sampleDots" class="sample-dots"></div>
        </div>

        <p id="statusMsg" class="status-desc register-status">Chụp 5–7 ảnh</p>

        <div class="action-row register-actions">
          <button id="btnCapture" class="btn btn-primary" type="button">Chụp</button>
          <button id="btnSave" class="btn btn-success" type="button" disabled>Lưu</button>
          <button id="btnReset" class="btn btn-secondary" type="button">Xóa</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>
  <script type="module" src="js/register.js"></script>
  <script src="js/capacitor-bridge.js"></script>
</body>
</html>

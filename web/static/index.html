<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Chấm công</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tablet.css" />
</head>
<body class="app-shell page-checkin">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M5 20c0-4 3.5-7 7-7s7 3 7 7"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Chấm công</h1>
      </div>
    </div>
    <div class="header-meta">
      <span id="lanBadge" class="lan-badge" hidden title="Server">LAN</span>
      <div class="clock clock-header" aria-live="polite">
        <div class="clock-time" id="clockTime">--:--:--</div>
        <div class="clock-date" id="clockDate">--</div>
      </div>
      <nav class="app-nav" aria-label="Menu">
        <a href="index.html" class="active">Chấm công</a>
        <a href="register.html">Đăng ký</a>
        <a href="setup.html" class="nav-settings" title="IP server">⚙</a>
      </nav>
    </div>
  </header>

  <div id="noEmployees" class="alert alert-warn hidden" role="alert">
    Chưa có nhân viên. <a href="register.html">Đăng ký</a>
  </div>

  <main class="app-main app-main-landscape checkin-main">
    <section class="panel camera-panel checkin-camera">
      <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay" aria-hidden="true"></canvas>
        <div class="face-scan-ring" aria-hidden="true"></div>
        <span class="camera-label">Đưa mặt vào khung</span>
      </div>
      <canvas id="captureCanvas" class="hidden" aria-hidden="true"></canvas>
    </section>

    <div class="checkin-sidebar">
      <section class="panel checkin-control-panel">
        <div class="status-zone status-zone-sidebar" id="statusZone">
          <div class="status-icon-wrap" id="statusIconWrap">
            <span id="statusIcon" aria-hidden="true"></span>
          </div>
          <h2 class="status-title" id="statusBadge">Sẵn sàng</h2>
          <p class="status-desc" id="statusDetail">Nhấn bắt đầu chấm công</p>
          <div id="progressWrap" class="progress-track hidden">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="action-row checkin-actions">
            <button id="btnStart" class="btn btn-primary" type="button">
              <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
              Bắt đầu
            </button>
            <button id="btnStop" class="btn btn-secondary hidden" type="button">Dừng</button>
          </div>
        </div>
      </section>

      <aside class="panel history-panel">
        <div class="panel-head panel-head-cols">
          <h2>Lịch sử</h2>
          <span class="col-hint">Độ khớp</span>
          <span class="badge-count" id="historyCount">0</span>
        </div>
        <div class="panel-body">
          <ul id="attendanceList" class="attendance-list">
            <li class="empty-state">Đang tải...</li>
          </ul>
        </div>
      </aside>
    </div>
  </main>

  <div id="successFlash" class="success-flash" aria-hidden="true"></div>
  <div id="toast" class="toast" role="status"></div>
  <script type="module" src="js/checkin.js"></script>
  <script src="js/capacitor-bridge.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <title>Cài đặt server</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tablet.css" />
</head>
<body class="app-shell page-setup">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Cài đặt</h1>
        <p>Kết nối server</p>
      </div>
    </div>
    <nav class="app-nav">
      <a href="index.html">Chấm công</a>
      <a href="register.html">Đăng ký</a>
      <a href="setup.html" class="active">Cài đặt</a>
    </nav>
  </header>

  <div class="setup-page">
    <div class="mode-tabs" role="tablist">
      <button type="button" class="mode-tab active" data-mode="lan" id="tabLan">
        <strong>Mạng LAN</strong>
        <span>PC chạy python app.py</span>
      </button>
      <button type="button" class="mode-tab" data-mode="cloud" id="tabCloud">
        <strong>Render Cloud</strong>
        <span>Wi‑Fi bất kỳ</span>
      </button>
    </div>

    <div class="setup-card-tablet">
      <h2 id="setupTitle">Kết nối PC trong mạng</h2>
      <p id="setupHint" style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:20px;">
        Nhập IP máy PC (ipconfig). Cùng Wi‑Fi với tablet.
      </p>

      <div class="form-group">
        <label for="serverHost" id="hostLabel">Địa chỉ server</label>
        <input id="serverHost" type="text" placeholder="192.168.10.206" autocomplete="off" />
      </div>
      <div class="form-group" id="portGroup">
        <label for="serverPort">Cổng</label>
        <input id="serverPort" type="number" value="8000" />
      </div>

      <div id="testStatus" class="status-test"></div>

      <div class="action-row" style="margin-top:20px">
        <button id="btnTest" class="btn btn-secondary" type="button">Kiểm tra</button>
        <button id="btnSave" class="btn btn-primary" type="button">Lưu &amp; vào app</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/setup.js"></script>
  <script src="js/capacitor-bridge.js"></script>
</body>
</html>

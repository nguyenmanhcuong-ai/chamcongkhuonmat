<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <title>Kết nối máy chủ</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/tablet.css" />
</head>
<body class="app-shell page-setup">
  <header class="app-header app-header-compact">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12.55a11 11 0 0114.08 0"/><circle cx="12" cy="20" r="1"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Kết nối máy chủ</h1>
      </div>
    </div>
    <div class="clock clock-header" aria-live="polite">
      <div class="clock-time" id="clockTime">--:--:--</div>
      <div class="clock-date" id="clockDate">--</div>
    </div>
  </header>

  <main class="setup-main">
    <div class="setup-card-simple">
      <div class="setup-fields">
        <div class="form-group setup-ip">
          <label for="serverHost">IP máy PC</label>
          <input id="serverHost" type="text" placeholder="192.168.10.206" inputmode="decimal" autocomplete="off" />
        </div>
        <div class="form-group setup-port">
          <label for="serverPort">Port</label>
          <input id="serverPort" type="number" value="8000" min="1" max="65535" />
        </div>
      </div>
      <div id="testStatus" class="status-test" hidden></div>
      <div class="setup-actions">
        <button id="btnTest" class="btn btn-secondary" type="button">Kiểm tra</button>
        <button id="btnSave" class="btn btn-primary" type="button">Vào app</button>
      </div>
    </div>
  </main>

  <script type="module" src="js/setup.js"></script>
  <script src="js/capacitor-bridge.js"></script>
</body>
</html>
